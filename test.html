<!doctype html>
<title>audio-decode</title>
<pre id="log"></pre>
<script type="module">
import decode from './audio-decode.js'

let pass = 0, fail = 0, log = document.getElementById('log')
let ok = (c, m) => { c ? pass++ : fail++; log.textContent += (c ? 'ok ' : 'FAIL ') + m + '\n' }
let near = (a, b, tol = 0.02) => Math.abs(a - b) < tol

// generate 16-bit PCM wav
function wav(sr, ch, len) {
	let bytes = ch * len * 2
	let buf = new DataView(new ArrayBuffer(44 + bytes))
	let s = (o, v) => { for (let i = 0; i < v.length; i++) buf.setUint8(o + i, v.charCodeAt(i)) }
	s(0, 'RIFF'); buf.setUint32(4, 36 + bytes, true); s(8, 'WAVE')
	s(12, 'fmt '); buf.setUint32(16, 16, true); buf.setUint16(20, 1, true)
	buf.setUint16(22, ch, true); buf.setUint32(24, sr, true)
	buf.setUint32(28, sr * ch * 2, true); buf.setUint16(32, ch * 2, true); buf.setUint16(34, 16, true)
	s(36, 'data'); buf.setUint32(40, bytes, true)
	for (let i = 0; i < ch * len; i++) buf.setInt16(44 + i * 2, Math.sin(i * 0.1) * 16000 | 0, true)
	return new Uint8Array(buf.buffer)
}

try {
	// whole-file
	let w = wav(44100, 1, 4410)
	let r = await decode(w)
	ok(r.channelData.length === 1, 'wav mono')
	ok(r.sampleRate === 44100, 'wav sampleRate')
	ok(r.channelData[0].length === 4410, 'wav samples')

	// stereo
	let w2 = wav(48000, 2, 9600)
	let r2 = await decode(w2)
	ok(r2.channelData.length === 2, 'wav stereo')
	ok(r2.sampleRate === 48000, 'wav stereo sampleRate')

	// streaming
	let dec = await decode.wav()
	let s = await dec(wav(44100, 1, 4410))
	ok(s.channelData[0].length > 0, 'stream decode')
	ok(s.sampleRate === 44100, 'stream sampleRate')

	// ArrayBuffer input
	ok((await decode(w.buffer)).channelData.length >= 1, 'ArrayBuffer input')

	// validation
	let threw = false
	try { await decode('hello') } catch (e) { threw = e instanceof TypeError }
	ok(threw, 'rejects string')
	threw = false
	try { await decode(null) } catch { threw = true }
	ok(threw, 'rejects null')
} catch (e) {
	ok(false, e.message)
	console.error(e)
}

log.textContent += `\n${pass + fail} tests, ${pass} passed, ${fail} failed`
document.title = fail ? `FAIL ${fail}` : `${pass} passed`
</script>
